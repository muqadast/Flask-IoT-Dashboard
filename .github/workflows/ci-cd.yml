
name: IoT Dashboard DevSecOps Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Check Code (Syntax Test)
      run: |
        python -m py_compile Arms.py


      # 🔍 SAST - CodeQL
  sast:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    needs: build

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze Code
        uses: github/codeql-action/analyze@v3


  # 🌐 DAST - OWASP ZAP
  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt || true

      - name: Start Flask App
        run: |
          python Arms.py &
          sleep 10

      - name: Run ZAP Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:5000'
          fail_action: false   # 🔥 pipeline fails if vulnerabilities found


  # 🐳 DEPLOY - Docker
  deploy:
    name: Deploy with Docker
    runs-on: ubuntu-latest
    needs: [sast, dast]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t flask-iot-secure .

      - name: Run Container
        run: docker run -d -p 5000:5000 flask-iot-secure
